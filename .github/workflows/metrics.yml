name: Metrics
on:
  schedule: [{cron: "0 16 * * *"}]   # täglich um 16:00 UTC
  workflow_dispatch:                  # manuell startbar
  push:
    branches: [main]

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      # ------------------- 1. Allgemeine Statistiken (general.svg) -------------------
      - name: 📊 General stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: general.svg
          base: "header, activity, community, repositories, metadata"
          base_indepth: yes
          config_timezone: Europe/Berlin
          config_padding: 20
          config_octicon: yes
          plugin_isocalendar: yes
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile
          plugin_languages_details: lines, bytes-size, percentage
          plugin_languages_sections: most-used, recently-used
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_topics: yes
          plugin_topics_limit: 0
          plugin_topics_mode: icons
          plugin_notable: yes
          plugin_discussions: yes

      # ------------------- 2. Achievements (achievements.svg) -------------------
      - name: 🏆 Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: achievements.svg
          base: ""
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed   # oder "compact"
          plugin_achievements_limit: 6

      # ------------------- 3. Indepth Issues & PR Analysis (issues.svg) -------------------
      - name: 🔍 Indepth issues analysis
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: issues.svg
          base: ""
          plugin_followup: yes
          plugin_followup_indepth: yes
          # optional: plugin_followup_sections (z.B. "repositories, user")

      # ------------------- 4. Repository Licenses (Permissions, Limitations, Conditions) -------------------
      - name: ⚖️ Repository licenses (legal)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: licenses.svg
          base: ""
          config_padding: 20
          plugin_licenses: yes
          plugin_licenses_setup: bash -c '[[ -f package.json ]] && npm ci || true'
          plugin_licenses_legal: yes             # zeigt Permissions, Limitations, Conditions
          plugin_licenses_ratio: yes             # zeigt Open‑Source‑Anteil der Dependencies

      # ------------------- 5. Google PageSpeed (pagespeed.svg) -------------------
      - name: 🚀 Google PageSpeed Insights
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: pagespeed.svg
          base: ""
          plugin_pagespeed: yes
          # plugin_pagespeed_token: ${{ secrets.PAGESPEED_TOKEN }}
          plugin_pagespeed_detailed: yes
          plugin_pagespeed_screenshot: no
          plugin_pagespeed_url: .user.website

      # ------------------- 6. (Optional) Stargazer Worldmap (stargazer.svg) -------------------
      # Aktivieren durch Entfernen der Kommentare – benötigt ggf. GOOGLE_MAPS_TOKEN
      # - name: 🌍 Stargazer worldmap
      #   uses: lowlighter/metrics@latest
      #   with:
      #     token: ${{ secrets.METRICS_TOKEN }}
      #     filename: stargazer.svg
      #     base: ""
      #     plugin_stargazers: yes
      #     plugin_stargazers_charts: yes
      #     plugin_stargazers_charts_type: classic
      #     plugin_stargazers_worldmap: yes
      #     plugin_stargazers_worldmap_sample: 500
      #     # plugin_stargazers_worldmap_token: ${{ secrets.GOOGLE_MAPS_TOKEN }}

      # ------------------- 7. (Optional) People (people.svg) -------------------
      # - name: 👥 Followers & following
      #   uses: lowlighter/metrics@latest
      #   with:
      #     token: ${{ secrets.METRICS_TOKEN }}
      #     filename: people.svg
      #     base: ""
      #     plugin_people: yes
      #     plugin_people_limit: 24
      #     plugin_people_size: 32
      #     plugin_people_types: followers, following