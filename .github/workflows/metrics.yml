# Licensed under The Unlicense
name: Metrics (multiple SVGs)

on:
  schedule: [{cron: "0 16 * * *"}]
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: read                         # Nur Lesen, kein Commit
    steps:
      - name: 📊 General stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: general.svg
          base: "header, activity, community, repositories, metadata"
          base_indepth: yes
          config_timezone: Europe/Berlin
          config_padding: 20
          config_octicon: yes
          plugin_isocalendar: yes
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile
          plugin_languages_details: lines, bytes-size, percentage
          plugin_languages_sections: most-used, recently-used
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_topics: yes
          plugin_topics_limit: 0
          plugin_topics_mode: icons
          plugin_notable: yes
          plugin_discussions: yes
          output_action: none                 # 🔴 Kein Commit, nur lokale Datei

      - name: 🏆 Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: achievements.svg
          base: ""
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 6
          output_action: none

      - name: 🔍 Issues & PRs
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: issues.svg
          base: ""
          plugin_followup: yes
          plugin_followup_indepth: yes
          output_action: none

      - name: ⚖️ Licenses
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: licenses.svg
          base: ""
          plugin_licenses: yes
          plugin_licenses_setup: bash -c '[[ -f package.json ]] && npm ci || true'
          plugin_licenses_legal: yes
          plugin_licenses_ratio: yes
          output_action: none

      - name: 🚀 PageSpeed
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: pagespeed.svg
          base: ""
          plugin_pagespeed: yes
          plugin_pagespeed_detailed: yes
          plugin_pagespeed_screenshot: no
          plugin_pagespeed_url: .user.website
          output_action: none

      - name: 🌍 Stargazer worldmap
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: stargazer.svg
          base: ""
          plugin_stargazers: yes
          plugin_stargazers_charts: yes
          plugin_stargazers_charts_type: classic
          plugin_stargazers_worldmap: yes
          plugin_stargazers_worldmap_sample: 500
          output_action: none

      - name: 👥 People
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: people.svg
          base: ""
          plugin_people: yes
          plugin_people_limit: 24
          plugin_people_size: 32
          plugin_people_types: followers, following
          output_action: none

      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: metrics-svgs
          path: |
            general.svg
            achievements.svg
            issues.svg
            licenses.svg
            pagespeed.svg
            stargazer.svg
            people.svg
          if-no-files-found: error