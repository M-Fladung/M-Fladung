name: Metrics
on:
  schedule: [{cron: "0 16 * * *"}]   # täglich um 16:00 UTC
  workflow_dispatch:                  # manuell startbar
  push:
    branches: [main]

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write                  # erlaubt das Speichern der SVGs im Repository
    steps:

      # ------------------- 1. Allgemeine Statistiken (general.svg) -------------------
      - name: 📊 General stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: general.svg
          base: "header, activity, community, repositories, metadata"
          base_indepth: yes
          config_timezone: Europe/Berlin
          config_padding: 20
          config_octicon: yes
          # Plugins für diesen Block
          plugin_isocalendar: yes
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile
          plugin_languages_details: lines, bytes-size, percentage
          plugin_languages_sections: most-used, recently-used
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_topics: yes
          plugin_topics_limit: 0
          plugin_topics_mode: icons
          plugin_notable: yes
          plugin_discussions: yes

      # ------------------- 2. Achievements (achievements.svg) -------------------
      - name: 🏆 Achievements & Fortune
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: achievements.svg
          base: ""                     # kein Basis-Header, nur das Plugin
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed+rank
          plugin_achievements_limit: 6
          plugin_fortune: yes          # zeigt ein lustiges Zitat oder einen Witz

      # ------------------- 3. Stargazer-Weltkarte, Lizenzen & PageSpeed (advanced.svg) -------------------
      - name: 🌍 Stargazer map, Licenses & PageSpeed
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: advanced.svg
          base: ""
          config_padding: 20
          # Stargazer mit Weltkarte
          plugin_stargazers: yes
          plugin_stargazers_charts: yes
          plugin_stargazers_charts_type: classic
          plugin_stargazers_worldmap: yes
          # plugin_stargazers_worldmap_token: ${{ secrets.GOOGLE_MAPS_TOKEN }}   # optional
          plugin_stargazers_worldmap_sample: 500
          # Repository Lizenzen (Achtung: erlaubt Kommandoausführung)
          plugin_licenses: yes
          plugin_licenses_setup: bash -c '[[ -f package.json ]] && npm ci || true'
          plugin_licenses_legal: yes
          plugin_licenses_ratio: yes
          # Google PageSpeed Insights
          plugin_pagespeed: yes
          # plugin_pagespeed_token: ${{ secrets.PAGESPEED_TOKEN }}               # optional
          plugin_pagespeed_detailed: yes
          plugin_pagespeed_screenshot: no
          plugin_pagespeed_url: .user.website

      # ------------------- 4. Follower & Following (people.svg) -------------------
      - name: 👥 People (followers/following)
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: people.svg
          base: ""
          plugin_people: yes
          plugin_people_limit: 24
          plugin_people_size: 32
          plugin_people_types: followers, following