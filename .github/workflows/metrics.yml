# Licensed under The Unlicense
name: Metrics (multiple SVGs)

on:
  schedule: [{cron: "0 16 * * *"}]
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  general:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: general.svg
          base: "header, activity"
          base_indepth: yes
          config_timezone: Europe/Berlin
          output_action: none
      - uses: actions/upload-artifact@v4
        with:
          name: general-svg
          path: general.svg

  achievements:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: achievements.svg
          base: ""
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 6
          output_action: none
      - uses: actions/upload-artifact@v4
        with:
          name: achievements-svg
          path: achievements.svg

  issues:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: issues.svg
          base: ""
          plugin_followup: yes
          plugin_followup_indepth: yes
          output_action: none
      - uses: actions/upload-artifact@v4
        with:
          name: issues-svg
          path: issues.svg

  licenses:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: licenses.svg
          base: ""
          plugin_licenses: yes
          plugin_licenses_setup: bash -c '[[ -f package.json ]] && npm ci || true'
          plugin_licenses_legal: yes
          plugin_licenses_ratio: yes
          output_action: none
      - uses: actions/upload-artifact@v4
        with:
          name: licenses-svg
          path: licenses.svg

  pagespeed:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: pagespeed.svg
          base: ""
          plugin_pagespeed: yes
          plugin_pagespeed_detailed: yes
          plugin_pagespeed_screenshot: no
          plugin_pagespeed_url: https://maurice-fladung.de
          output_action: none
      - uses: actions/upload-artifact@v4
        with:
          name: pagespeed-svg
          path: pagespeed.svg

  stargazer:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: stargazer.svg
          base: ""
          plugin_stargazers: yes
          plugin_stargazers_charts: yes
          plugin_stargazers_charts_type: classic
          plugin_stargazers_worldmap: yes
          plugin_stargazers_worldmap_sample: 500
          output_action: none
      - uses: actions/upload-artifact@v4
        with:
          name: stargazer-svg
          path: stargazer.svg

  people:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: people.svg
          base: ""
          plugin_people: yes
          plugin_people_limit: 24
          plugin_people_size: 32
          plugin_people_types: followers, following
          output_action: none
      - uses: actions/upload-artifact@v4
        with:
          name: people-svg
          path: people.svg