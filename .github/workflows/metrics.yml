# 📊 Vollständige Metrics-Konfiguration (Version 4.x)
# Enthält: Achievements, Stargazer (Weltkarte), Lizenzen, PageSpeed, responsive Zentrierung
# ----------------------------------------------------------------------------------------
name: "📊 GitHub Metrics - Vollausstattung"

on:
  schedule:
    - cron: "0 0 * * *"          # Täglich um Mitternacht
  workflow_dispatch:              # Manuell startbar
  push:
    branches:
      - "main"

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # ---------- Basis ----------
          token: ${{ secrets.METRICS_TOKEN }}
          config_display: columns               # 2 Spalten Desktop, 1 Spalte mobil
          filename: metrics.svg
          user: ${{ github.repository_owner }}
          base: "header, activity, community, repositories, metadata"
          config_timezone: Europe/Berlin
          config_padding: 20
          config_octicon: yes

          # ---------- Achievements ----------
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed+rank
          plugin_achievements_limit: 5

          # ---------- Followup ----------
          plugin_followup: yes
          plugin_followup_indepth: yes

          # ---------- Meistgenutzte Sprachen ----------
          plugin_languages: yes
          plugin_languages_limit: 10
          plugin_languages_threshold: 1
          plugin_languages_ignored: html, css
          plugin_languages_details: percentage
          plugin_languages_sections: most-used

          # ---------- Stargazer (inkl. Weltkarte) ----------
          plugin_stargazers: yes
          plugin_stargazers_charts: yes
          plugin_stargazers_charts_type: classic
          plugin_stargazers_worldmap: yes
          # plugin_stargazers_worldmap_token: ${{ secrets.GOOGLE_MAPS_TOKEN }}  # optional
          plugin_stargazers_worldmap_sample: 500

          # ---------- Repository Lizenzen ----------
          # ⚠️ Achtung: Erlaubt Kommandoausführung – nur in vertrauenswürdiger Umgebung (GitHub Actions)
          plugin_licenses: yes
          plugin_licenses_setup: bash -c '[[ -f package.json ]] && npm ci || true'
          plugin_licenses_legal: yes
          plugin_licenses_ratio: yes

          # ---------- Google PageSpeed Insights ----------
          plugin_pagespeed: yes
          # plugin_pagespeed_token: ${{ secrets.PAGESPEED_TOKEN }}   # optional, aber empfohlen
          plugin_pagespeed_detailed: yes
          plugin_pagespeed_screenshot: no
          plugin_pagespeed_url: .user.website

          # ---------- People (Follower & Following) ----------
          plugin_people: yes
          plugin_people_limit: 24
          plugin_people_size: 32
          plugin_people_types: followers, following

          # ---------- Zentrierung des gesamten Dashboards (extras_css) ----------
          extras_css: |
            .wrapper {
              max-width: 1200px !important;
              margin-left: auto !important;
              margin-right: auto !important;
            }
            .column {
              min-width: 280px !important;
            }